<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 640px;
    background: #0e0b08;
    font-family: 'Menlo', 'SF Mono', 'Courier New', monospace;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .mascot {
    font-size: 80px;
    line-height: 1.1;
    letter-spacing: 4px;
    white-space: pre;
    margin-bottom: 40px;
  }

  .text-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .name-row {
    display: flex;
    align-items: baseline;
    gap: 24px;
    margin-bottom: 40px;
  }

  .logo {
    font-size: 84px;
    font-weight: bold;
    color: #F09464;
    letter-spacing: -2px;
    line-height: 1;
  }

  .dot {
    font-size: 36px;
    color: #4a3428;
  }

  .project-name {
    font-size: 52px;
    color: #786452;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .tagline {
    font-size: 26px;
    color: #a07860;
    letter-spacing: 0.5px;
    margin-bottom: 20px;
  }

  .tagline em {
    font-style: normal;
    color: #DCC3AA;
  }

  .url {
    font-size: 20px;
    color: #c8a888;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

  <!-- Mascot (gradient, lie=1) -->
  <div class="mascot"><!--
--><span style="color:#FFB464">█</span><span style="color:#FFB464">▛</span><span style="color:#F08C50">█</span><span style="color:#D97757">█</span><span style="color:#C15F3C">▜</span><span style="color:#C15F3C">▌</span>
<span style="color:#FFB464">█</span><span style="color:#FFB464">█</span><span style="color:#F08C50">█</span><span style="color:#D97757">█</span><span style="color:#C15F3C">█</span><span style="color:#C15F3C">▛</span><span style="color:#A04B37">▀</span><span style="color:#823C32">▀</span>
<span style="color:#FFB464">▘</span><span style="color:#FFB464">▘</span><span style="color:#F08C50"> </span><span style="color:#D97757">▝</span><span style="color:#C15F3C">▝</span></div>

  <div class="text-group">
    <div class="name-row">
      <span class="logo">p_</span>
      <span class="dot">·</span>
      <span class="project-name">Pinnochio</span>
    </div>
    <div class="tagline">
      The coding agent that promises everything and does <em>absolutely nothing</em>.
    </div>
    <div class="url">github.com/sanieldoe/p_</div>
  </div>

</body>
</html>
